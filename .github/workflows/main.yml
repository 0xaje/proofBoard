name: ProofBoard Infrastructure Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Verify Infrastructure Build
      run: npm run build
      env:
        NEXT_PUBLIC_WALRUS_ENDPOINT: ${{ secrets.NEXT_PUBLIC_WALRUS_ENDPOINT }}
        NEXT_PUBLIC_WALRUS_AGGREGATOR: ${{ secrets.NEXT_PUBLIC_WALRUS_AGGREGATOR }}
        
    - name: Lint Protocol Layer
      run: npm run lint
